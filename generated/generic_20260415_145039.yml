    - data:
        code: "def main(ftp_config, api_config, db_config):\n    import json\n   \
          \ required = ['ftp_config', 'api_config', 'db_config']\n    missing = []\n\
          \    for req in required:\n        if not locals().get(req):\n         \
          \   missing.append(req)\n    if missing:\n        return {'valid': False,\
          \ 'missing': missing, 'message': f'缺少必要配置: {missing}'}\n    try:\n     \
          \   json.loads(ftp_config)\n        json.loads(api_config)\n        json.loads(db_config)\n\
          \        return {'valid': True, 'message': '配置校验通过'}\n    except Exception\
          \ as e:\n        return {'valid': False, 'message': f'配置格式错误: {str(e)}'}\n"
