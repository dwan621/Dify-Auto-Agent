app:
  description: 一个用于自动化处理每日CSV日志文件的完整工作流。它从FTP服务器获取原始数据，进行清洗、转换、地理位置补全，然后写入数据库。根据业务规则判断风险，触发告警或生成报表，最后汇总所有日志和状态回传至监控平台。
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: advanced-chat
  name: 自动化数据处理与监控工作流
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/deepseek:0.0.11@35bcd3f233f99d07bdadef8b326945df3bda5e8f773330144bc90d84800336b9
    version: null
kind: app
version: 0.6.0
