    - data:
        code: "def main(raw_data):\n    import pandas as pd\n    import json\n   \
          \ from io import StringIO\n    \n    # 假设raw_data是CSV字符串\n    df = pd.read_csv(StringIO(raw_data))\n\
          \    \n    # 清洗操作\n    df = df.dropna(subset=['timestamp', 'user_id', 'action'])\n\
          \    df['timestamp'] = pd.to_datetime(df['timestamp'], errors='coerce')\n\
          \    df = df.dropna(subset=['timestamp'])\n    \n    # 标准化字段\n    if 'ip_address'\
          \ in df.columns:\n        df['ip_address'] = df['ip_address'].astype(str).str.strip()\n\
          \    \n    cleaned_csv = df.to_csv(index=False)\n    stats = {\n       \
          \ 'original_rows': len(raw_data.split('\\n')) - 1,\n        'cleaned_rows':\
          \ len(df),\n        'dropped_rows': (len(raw_data.split('\\n')) - 1) - len(df),\n\
          \        'columns': list(df.columns)\n    }\n    return {'cleaned_data':\
          \ cleaned_csv, 'stats': stats}\n"
        code_language: python
        outputs:
          result:
            type: string
            children: null
        selected: false
        title: data_clean
        type: code
        variables:
