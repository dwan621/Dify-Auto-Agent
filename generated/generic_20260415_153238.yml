    - data:
        code: "import pandas as pd\nimport json\n\ndef clean_data(raw_data):\n   \
          \ # 解析CSV数据\n    df = pd.read_csv(pd.compat.StringIO(raw_data))\n    \n\
          \    # 去除空值\n    df = df.dropna()\n    \n    # 过滤异常模式（示例：过滤特定IP范围）\n   \
          \ df = df[~df['ip_address'].str.startswith('192.168.')]\n    \n    return\
          \ df.to_dict(orient='records')\n\n# 执行清洗\ncleaned_data = clean_data(input_data)\n"
