    - data:
        code: "import psycopg2\nimport json\n\ndef write_to_db(data, connection_string):\n\
          \    conn = psycopg2.connect(connection_string)\n    cursor = conn.cursor()\n\
          \    \n    records_processed = 0\n    for record in data:\n        try:\n\
          \            cursor.execute(\n                \"INSERT INTO logs (timestamp,\
          \ ip, location, event) VALUES (%s, %s, %s, %s)\",\n                (record['timestamp'],\
          \ record['ip'], record['location'], record['event'])\n            )\n  \
          \          records_processed += 1\n        except Exception as e:\n    \
          \        print(f\"Error inserting record: {e}\")\n    \n    conn.commit()\n\
          \    cursor.close()\n    conn.close()\n    \n    return {\"records_processed\"\
          : records_processed}\n\n# 执行写入\nresult = write_to_db(input_data, db_connection)\n"
        code_language: python
