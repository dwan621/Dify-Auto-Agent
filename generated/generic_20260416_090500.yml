    nodes:
    - data:
        selected: false
        title: 订单事件接收
        type: start
        variables:
        - default: ''
          hint: ''
          label: 前端订单创建事件数据
          options: []
          placeholder: ''
          required: true
          type: text-input
          variable: order_event
      height: 72
      id: start
      position:
        x: 80
        y: 280
      positionAbsolute:
        x: 80
        y: 280
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\n\ndef validate_order(order_data):\n    try:\n        order\
          \ = json.loads(order_data)\n        required_fields = ['order_id', 'customer_id',\
          \ 'items', 'total_amount']\n        for field in required_fields:\n    \
          \        if field not in order:\n                return {'valid': False,\
          \ 'error': f'Missing required field: {field}'}\n        \n        if not\
          \ isinstance(order['items'], list) or len(order['items']) == 0:\n      \
          \      return {'valid': False, 'error': 'Items must be a non-empty list'}\n\
          \        \n        if order['total_amount'] <= 0:\n            return {'valid':\
          \ False, 'error': 'Total amount must be positive'}\n        \n        return\
          \ {'valid': True, 'order': order}\n    except json.JSONDecodeError:\n  \
          \      return {'valid': False, 'error': 'Invalid JSON format'}\n\nresult\
          \ = validate_order(input)\noutput = result\n"
        code_language: python
        outputs:
          result:
            type: string
            children: null
        selected: false
        title: 订单数据验证
        type: code
        variables:
        - value_selector:
          - start
          - order_event
          variable: input
      height: 51
      id: code_validate
      position:
        x: 380
        y: 280
      positionAbsolute:
        x: 380
        y: 280
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    - data:
        cases:
        - case_id: valid
          id: valid
          logical_operator: or
          conditions:
          - id: cond_5b0f921b
            varType: string
            comparison_operator: contains
            value: ROUTE=valid
            variable_selector:
            - code_validate
            - text
        - case_id: invalid
          id: invalid
          logical_operator: or
          conditions:
          - id: cond_31488eb3
