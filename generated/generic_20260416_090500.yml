        y: 280
      positionAbsolute:
        x: 1580
        y: 280
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    - data:
        context:
          enabled: false
          variable_selector: []
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - role: system
          text: '基于以下订单处理结果，生成最终的履约状态报告：


            订单数据：{{order_data}}

            库存预占结果：{{inventory_result}}

            支付处理结果：{{payment_result}}

            物流下单结果：{{logistics_result}}

            审计日志ID：{{audit_log.audit_log_id}}


            请输出JSON格式，包含以下字段：

            - final_order_status: 订单最终状态（processing/shipped/cancelled）

            - fulfillment_result: 履约结果（success/partial_success/failure）

            - payment_transaction_id: 支付交易ID（如果支付成功）

            - logistics_order_id: 物流订单ID（如果物流下单成功）

            - audit_log_id: 审计日志ID

            - error_messages: 错误信息数组（如果有错误）


            用户输入：

            - order_event: {{#start.order_event#}}


            【上游节点输出结果】:

            - variable_aggregator: {{#variable_aggregator.output#}}


            输出要求：

            - 只输出最终结果，不要输出推理过程或解释

            - 不要输出 markdown 代码块围栏（```）'
        selected: false
        title: 生成最终状态
        type: llm
        vision:
          enabled: false
