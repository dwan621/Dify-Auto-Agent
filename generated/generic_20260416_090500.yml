          - id: cond_f91cc493
            varType: string
            comparison_operator: contains
            value: ROUTE=payment_failed
            variable_selector:
            - ifelse_validation
            - text
        selected: false
        title: 支付结果判断
        type: if-else
      height: 99
      id: ifelse_payment
      position:
        x: 980
        y: 280
      positionAbsolute:
        x: 980
        y: 280
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    - data:
        code: "import json\nimport uuid\nimport datetime\n\ndef create_audit_log(order_data,\
          \ inventory_result, payment_result, logistics_result):\n    log_id = str(uuid.uuid4())\n\
          \    timestamp = datetime.datetime.now().isoformat()\n    \n    audit_log\
          \ = {\n        'audit_log_id': log_id,\n        'timestamp': timestamp,\n\
          \        'order_id': order_data.get('order_id'),\n        'customer_id':\
          \ order_data.get('customer_id'),\n        'inventory_lock_result': inventory_result,\n\
          \        'payment_result': payment_result,\n        'logistics_result':\
          \ logistics_result,\n        'workflow_status': 'completed'\n    }\n   \
          \ \n    return audit_log\n\nlog_data = create_audit_log(order, inventory_result,\
          \ payment_result, logistics_result)\noutput = log_data\n"
        code_language: python
        outputs:
          result:
            type: string
            children: null
        selected: false
        title: 生成审计日志
        type: code
        variables:
        - value_selector:
          - code_validate
          - output.order
          variable: order
        - value_selector:
          - tool_inventory_lock
          - output
          variable: inventory_result
        - value_selector:
          - tool_payment
          - output
          variable: payment_result
        - value_selector:
          - tool_logistics
          - output
          variable: logistics_result
      height: 51
      id: code_audit_log
      position:
        x: 1280
        y: 280
      positionAbsolute:
        x: 1280
        y: 280
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    - data:
        code: "\nimport json\n\ndef main(arg1: str = \"\"):\n    values = []\n   \
          \ values.append(arg1)\n    for v in values:\n        if v is None:\n   \
          \         continue\n        if isinstance(v, str) and v.strip():\n     \
          \       return {\"output\": v}\n        if not isinstance(v, str):\n   \
          \         try:\n                s = json.dumps(v, ensure_ascii=False)\n\
          \                if isinstance(s, str) and s.strip():\n                \
          \    return {\"output\": s}\n            except Exception:\n           \
          \     pass\n    return {\"output\": \"\"}\n"
        code_language: python3
        outputs:
          output:
            type: string
            children: null
        selected: false
        title: 结果聚合
        type: code
        variables:
        - variable: arg1
          value_selector:
          - code_audit_log
          - result
