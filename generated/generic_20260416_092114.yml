      position:
        x: 80
        y: 280
      positionAbsolute:
        x: 80
        y: 280
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        authorization:
          config: null
          type: no-auth
        body:
          type: none
          data: []
        headers: 'Content-Type: application/json'
        method: post
        params: ''
        retry_config:
          max_retries: 3
          retry_enabled: true
          retry_interval: 100
        selected: true
        ssl_verify: true
        timeout:
          max_connect_timeout: 0
          max_read_timeout: 0
          max_write_timeout: 0
        title: 代码质量分析
        type: http-request
        url: https://httpbin.org/get
        variables:
        - value_selector:
          - start
          - repository_url
          variable: repository_url
        - value_selector:
          - start
          - branch
          variable: branch
        - value_selector:
          - start
          - sonar_project_key
          variable: sonar_project_key
      height: 80
      id: code_quality_check
      position:
        x: 380
        y: 280
      positionAbsolute:
        x: 380
        y: 280
      selected: true
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    - data:
        cases:
        - case_id: pass
          id: pass
          logical_operator: or
          conditions:
          - id: cond_9c0a1a2f
            varType: string
            comparison_operator: contains
            value: ROUTE=pass
            variable_selector:
            - code_quality_check
            - text
        - case_id: fail
          id: fail
          logical_operator: or
          conditions:
          - id: cond_ea5064fb
            varType: string
            comparison_operator: contains
            value: ROUTE=fail
            variable_selector:
            - code_quality_check
            - text
        selected: false
        title: 质量门禁检查
        type: if-else
      height: 99
      id: quality_gate
      position:
        x: 680
        y: 280
      positionAbsolute:
        x: 680
        y: 280
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    - data:
        cases:
        - case_id: healthy
          id: healthy
          logical_operator: or
          conditions:
          - id: cond_fb8e0bd3
            varType: string
            comparison_operator: contains
            value: ROUTE=healthy
            variable_selector:
            - quality_gate
            - text
        - case_id: unhealthy
          id: unhealthy
          logical_operator: or
          conditions:
          - id: cond_f9842be5
            varType: string
            comparison_operator: contains
            value: ROUTE=unhealthy
            variable_selector:
            - quality_gate
            - text
        selected: false
        title: 回滚决策
        type: if-else
      height: 99
      id: rollback_decision
      position:
        x: 980
        y: 280
      positionAbsolute:
        x: 980
        y: 280
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    - data:
        code: "\nimport json\n\ndef main(arg1: str = \"\", arg2: str = \"\", arg3:\
          \ str = \"\", arg4: str = \"\"):\n    values = []\n    values.append(arg1)\n\
          \    values.append(arg2)\n    values.append(arg3)\n    values.append(arg4)\n\
          \    for v in values:\n        if v is None:\n            continue\n   \
          \     if isinstance(v, str) and v.strip():\n            return {\"output\"\
          : v}\n        if not isinstance(v, str):\n            try:\n           \
          \     s = json.dumps(v, ensure_ascii=False)\n                if isinstance(s,\
          \ str) and s.strip():\n                    return {\"output\": s}\n    \
          \        except Exception:\n                pass\n    return {\"output\"\
          : \"\"}\n"
        code_language: python3
        outputs:
          output:
            type: string
            children: null
        selected: false
        title: 结果聚合
        type: code
        variables:
        - variable: arg1
          value_selector:
          - quality_gate
          - result
        - variable: arg2
          value_selector:
          - quality_gate
          - result
        - variable: arg3
          value_selector:
          - rollback_decision
          - result
        - variable: arg4
          value_selector:
          - rollback_decision
          - result
      height: 51
      id: aggregator
      position:
        x: 1280
        y: 280
      positionAbsolute:
        x: 1280
        y: 280
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    - data:
        code: "import json\n\ndef main(input_data):\n    quality_status = input_data.get('quality_status',\
          \ 'UNKNOWN')\n    new_image_tag = input_data.get('new_image_tag', 'N/A')\n\
          \    deployment_status = input_data.get('deployment_status', 'UNKNOWN')\n\
          \    monitoring_metrics = input_data.get('monitoring_metrics', {})\n   \
          \ rollback_status = input_data.get('rollback_status', 'N/A')\n    \n   \
          \ error_rate = monitoring_metrics.get('error_rate', 0)\n    latency = monitoring_metrics.get('latency',\
          \ 0)\n    \n    final_status = '成功'\n    if deployment_status == 'FAILED':\n\
          \        final_status = '失败'\n    elif rollback_status == 'SUCCESS':\n \
          \       final_status = '已回滚'\n    \n    report = f\"# CI/CD 部署报告\\n\\n\"\
          \n    report += f\"## 构建状态\\n- 代码质量检查: {quality_status}\\n\"\n    report\
          \ += f\"- Docker镜像标签: {new_image_tag}\\n\"\n    report += f\"\\n## 发布状态\\\
          n- 部署状态: {deployment_status}\\n\"\n    report += f\"- 最终状态: {final_status}\\\
          n\"\n    report += f\"\\n## 监控指标\\n- 错误率: {error_rate:.2%}\\n\"\n    report\
          \ += f\"- 延迟: {latency}ms\\n\"\n    report += f\"\\n## 回滚状态\\n- 回滚操作: {rollback_status}\\\
          n\"\n    \n    return {\n        'final_report': report,\n        'pipeline_log_url':\
          \ 'https://logs.example.com/pipeline-12345',\n        'deployment_status':\
          \ final_status,\n        'new_image_tag': new_image_tag\n    }\n\nresult\
          \ = main(input)\n"
        code_language: python
        outputs:
          result:
            type: string
            children: null
        selected: false
        title: 生成最终报告
        type: code
        variables:
        - value_selector:
          - aggregator
          - aggregated_data
          variable: input
      height: 51
      id: report_generator
      position:
        x: 1580
        y: 280
      positionAbsolute:
        x: 1580
        y: 280
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
    - data:
        answer: '{{#report_generator.result#}}'
        selected: false
        title: 完成
        type: answer
        variables: []
      height: 102
      id: answer
      position:
        x: 1880
        y: 280
      positionAbsolute:
        x: 1880
        y: 280
      selected: true
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 241
