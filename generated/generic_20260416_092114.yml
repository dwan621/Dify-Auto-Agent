        sourceType: code
        targetType: code
        isInIteration: false
        isInLoop: false
      id: aggregator-source-report_generator-target
      source: aggregator
      sourceHandle: source
      target: report_generator
      targetHandle: target
      type: custom
    - data:
        sourceType: http-request
        targetType: if-else
        isInIteration: false
        isInLoop: false
      id: code_quality_check-source-quality_gate-target
      source: code_quality_check
      sourceHandle: source
      target: quality_gate
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: code
        isInIteration: false
        isInLoop: false
      id: quality_gate-fail-aggregator-target
      source: quality_gate
      sourceHandle: fail
      target: aggregator
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: code
        isInIteration: false
        isInLoop: false
      id: quality_gate-pass-aggregator-target
      source: quality_gate
      sourceHandle: pass
      target: aggregator
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: if-else
        isInIteration: false
        isInLoop: false
      id: quality_gate-pass-rollback_decision-target
      source: quality_gate
      sourceHandle: pass
      target: rollback_decision
      targetHandle: target
      type: custom
    - data:
        sourceType: code
        targetType: answer
        isInIteration: false
        isInLoop: false
      id: report_generator-source-answer-target
      source: report_generator
      sourceHandle: source
      target: answer
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: code
        isInIteration: false
        isInLoop: false
      id: rollback_decision-healthy-aggregator-target
      source: rollback_decision
      sourceHandle: healthy
      target: aggregator
      targetHandle: target
      type: custom
    - data:
        sourceType: if-else
        targetType: code
        isInIteration: false
        isInLoop: false
      id: rollback_decision-unhealthy-aggregator-target
      source: rollback_decision
      sourceHandle: unhealthy
      target: aggregator
      targetHandle: target
      type: custom
    - data:
        sourceType: start
        targetType: http-request
        isInIteration: false
        isInLoop: false
      id: start-source-code_quality_check-target
      source: start
      sourceHandle: source
      target: code_quality_check
      targetHandle: target
      type: custom
    nodes:
    - data:
        selected: false
        title: 开始
        type: start
        variables:
        - default: ''
          hint: ''
          label: 代码仓库地址
          options: []
          placeholder: ''
          required: true
          type: text-input
