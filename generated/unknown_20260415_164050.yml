    - data:
        code: "import pandas as pd\nimport json\nfrom io import StringIO\n\nfile_contents\
          \ = context.get('file_contents', {})\ncleaned_data = {}\n\nfor filename,\
          \ content in file_contents.items():\n    try:\n        df = pd.read_csv(StringIO(content))\n\
          \        # 去除空行\n        df = df.dropna(how='all')\n        # 去除重复行\n  \
          \      df = df.drop_duplicates()\n        # 标准化列名\n        df.columns =\
          \ df.columns.str.strip().str.lower().str.replace(' ', '_')\n        # 确保必要列存在\n\
          \        required_cols = ['timestamp', 'ip_address', 'user_id', 'action']\n\
          \        for col in required_cols:\n            if col not in df.columns:\n\
          \                df[col] = None\n        \n        cleaned_data[filename]\
          \ = df.to_dict('records')\n    except Exception as e:\n        print(f'Error\
          \ processing {filename}: {e}')\n        continue\n\nreturn {\n    'cleaned_files':\
          \ list(cleaned_data.keys())\n"
        code_language: python
        outputs:
          result:
            type: string
            children: null
        selected: false
        title: data_clean
        type: code
        variables:
