    - data:
        code: "import json\nimport ftplib\nfrom io import BytesIO\n\nftp_config =\
          \ json.loads(context.get('ftp_config'))\nhost = ftp_config.get('host')\n\
          port = ftp_config.get('port', 21)\nusername = ftp_config.get('username')\n\
          password = ftp_config.get('password')\npath = ftp_config.get('path', '/')\n\
          \nftp = ftplib.FTP()\nftp.connect(host, port)\nftp.login(username, password)\n\
          ftp.cwd(path)\n\nfiles = []\nftp.retrlines('LIST', files.append)\ncsv_files\
          \ = [f.split()[-1] for f in files if f.lower().endswith('.csv')]\n\nfile_contents\
          \ = {}\nfor filename in csv_files[:5]:  # 限制处理前5个文件\n    bio = BytesIO()\n\
          \    ftp.retrbinary(f'RETR {filename}', bio.write)\n    file_contents[filename]\
          \ = bio.getvalue().decode('utf-8')\n\nftp.quit()\nreturn {\n    'connected':\
          \ True\n"
        code_language: python
        outputs:
          result:
            type: string
            children: null
        selected: false
        title: ftp_connect
        type: code
        variables:
        - variable: input_text
          value_selector:
          - start
          - ftp_config
        error_strategy: fail-branch
