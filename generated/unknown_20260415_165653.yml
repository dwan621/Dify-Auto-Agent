    - data:
        code: "def ftp_connect(ftp_config):\n    import ftplib\n    import json\n\
          \    from datetime import datetime, timedelta\n    \n    config = json.loads(ftp_config)\n\
          \    ftp = ftplib.FTP(config['host'])\n    ftp.login(config['username'],\
          \ config['password'])\n    ftp.cwd(config['path'])\n    \n    files = ftp.nlst()\n\
          \    csv_files = [f for f in files if f.endswith('.csv')]\n    \n    yesterday\
          \ = (datetime.now() - timedelta(days=1)).strftime('%Y%m%d')\n    target_files\
          \ = [f for f in csv_files if yesterday in f]\n    \n    ftp.quit()\n   \
          \ \n    return {\n        'files_found': len(target_files)\n"
