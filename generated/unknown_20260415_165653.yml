    - data:
        code: "def download_and_clean(ftp_config, file_list):\n    import ftplib\n\
          \    import json\n    import pandas as pd\n    import io\n    import re\n\
          \    \n    config = json.loads(ftp_config)\n    ftp = ftplib.FTP(config['host'])\n\
          \    ftp.login(config['username'], config['password'])\n    ftp.cwd(config['path'])\n\
          \    \n    cleaned_data = []\n    processed_files = []\n    \n    for filename\
          \ in file_list:\n        try:\n            # 下载文件\n            data = io.BytesIO()\n\
          \            ftp.retrbinary(f'RETR {filename}', data.write)\n          \
          \  data.seek(0)\n            \n            # 读取CSV\n            df = pd.read_csv(data,\
          \ encoding='utf-8', on_bad_lines='skip')\n            \n            # 数据清洗\n\
          \            # 1. 去除空行\n            df = df.dropna(how='all')\n        \
          \    # 2. 去除重复行\n            df = df.drop_duplicates()\n            # 3.\
          \ 标准化列名\n            df.columns = [re.sub(r'[^a-zA-Z0-9_]', '_', col.strip().lower())\
          \ for col in df.columns]\n            # 4. 确保必要列存在\n            required_cols\
          \ = ['timestamp', 'ip_address', 'user_id', 'action', 'status_code']\n  \
          \          for col in required_cols:\n                if col not in df.columns:\n\
          \                    df[col] = None\n            \n            cleaned_data.append({\n\
          \                'filename': filename\n"
        code_language: python
