          \    except:\n        errors.append('FTP配置JSON格式错误')\n    \n    try:\n \
          \       db = json.loads(db_connection)\n        if not all(k in db for k\
          \ in ['host', 'database', 'username', 'password']):\n            errors.append('数据库配置缺少必要字段')\n\
          \    except:\n        errors.append('数据库配置JSON格式错误')\n    \n    if not api_key\
