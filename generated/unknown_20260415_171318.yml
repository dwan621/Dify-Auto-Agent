    - data:
        code: "import pandas as pd\nfrom datetime import datetime, timedelta\n\ndef\
          \ main(data):\n    df = pd.DataFrame(data)\n    anomalies = []\n    \n \
          \   # 检查异常登录\n    if 'action' in df.columns and 'timestamp' in df.columns:\n\
          \        recent_logins = df[df['action'] == 'LOGIN'].copy()\n        if\
          \ not recent_logins.empty:\n            recent_logins['timestamp'] = pd.to_datetime(recent_logins['timestamp'])\n\
          \            \n            # 查找短时间内多次登录\n            recent_logins = recent_logins.sort_values('timestamp')\n\
          \            for i in range(1, len(recent_logins)):\n                time_diff\
          \ = recent_logins.iloc[i]['timestamp'] - recent_logins.iloc[i-1]['timestamp']\n\
          \                if time_diff < timedelta(seconds=30):\n               \
          \     anomaly = {\n                        'type': 'rapid_logins',\n   \
          \                     'ip': recent_logins.iloc[i]['ip_address'],\n     \
          \                   'timestamp': str(recent_logins.iloc[i]['timestamp']),\n\
          \                        'details': '30秒内多次登录尝试'\n                    }\n\
          \                    anomalies.append(anomaly)\n    \n    # 检查可疑IP\n   \
          \ if 'country' in df.columns:\n        country_counts = df['country'].value_counts()\n\
          \        suspicious_countries = country_counts[country_counts > 100].index.tolist()\n\
          \        for country in suspicious_countries:\n            anomaly = {\n\
          \                'type': 'suspicious_country',\n                'country':\
          \ country,\n                'count': int(country_counts[country]),\n   \
          \             'details': f'来自{country}的访问次数异常'\n            }\n        \
          \    anomalies.append(anomaly)\n    \n    return {\n        'status': 'success',\n\
          \        'anomalies': anomalies,\n        'anomaly_count': len(anomalies)\n\
          \    }\n"
        code_language: python
