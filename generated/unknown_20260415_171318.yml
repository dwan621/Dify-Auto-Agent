    - data:
        code: "import json\nimport ftplib\nimport pandas as pd\nfrom io import StringIO\n\
          \ndef main(ftp_config, file_name):\n    try:\n        config = json.loads(ftp_config)\n\
          \        ftp = ftplib.FTP(config['host'])\n        ftp.login(config['username'],\
          \ config['password'])\n        ftp.cwd(config['directory'])\n        \n\
          \        data = BytesIO()\n        ftp.retrbinary(f'RETR {file_name}', data.write)\n\
          \        ftp.quit()\n        \n        data.seek(0)\n        df = pd.read_csv(StringIO(data.read().decode('utf-8')))\n\
          \        \n        return {\n            'status': 'success',\n        \
          \    'file_name': file_name,\n            'data': df.to_dict('records'),\n\
          \            'row_count': len(df)\n        }\n    except Exception as e:\n\
          \        return {'status': 'error', 'message': str(e)}\n"
