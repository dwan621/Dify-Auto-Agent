    - data:
        code: "import pandas as pd\nimport numpy as np\n\ndef main(data):\n    df\
          \ = pd.DataFrame(data)\n    \n    # 删除空行\n    df = df.dropna(subset=['timestamp',\
          \ 'ip_address', 'action'])\n    \n    # 标准化时间格式\n    if 'timestamp' in df.columns:\n\
          \        df['timestamp'] = pd.to_datetime(df['timestamp'], errors='coerce')\n\
          \    \n    # 清理IP地址\n    if 'ip_address' in df.columns:\n        df['ip_address']\
          \ = df['ip_address'].str.strip()\n    \n    # 清理动作字段\n    if 'action' in\
          \ df.columns:\n        df['action'] = df['action'].str.upper().str.strip()\n\
          \    \n    return {\n        'status': 'success',\n        'cleaned_data':\
          \ df.to_dict('records'),\n        'original_rows': len(data),\n        'cleaned_rows':\
          \ len(df),\n        'removed_rows': len(data) - len(df)\n    }\n"
        code_language: python
        outputs:
