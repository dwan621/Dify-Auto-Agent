    - data:
        code: "import json\nimport ftplib\nimport tempfile\nimport os\nconfig = json.loads(config)\n\
          plan = json.loads(plan)\nftp = ftplib.FTP(config['host'])\nftp.login(config['user'],\
          \ config['password'])\nfiles = plan.get('files', [])\ndownloaded = []\n\
          for file in files:\n    local_path = os.path.join(tempfile.gettempdir(),\
          \ file)\n    with open(local_path, 'wb') as f:\n        ftp.retrbinary(f'RETR\
          \ {file}', f.write)\n    downloaded.append(local_path)\nftp.quit()\nreturn\
          \ {'downloaded_files': downloaded, 'count': len(downloaded)}\n"
