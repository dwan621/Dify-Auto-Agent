    - data:
        code: "import pandas as pd\nimport json\nresult = json.loads(result)\nfiles\
          \ = result.get('files_result', {}).get('downloaded_files', []) or result.get('fallback_result',\
          \ {}).get('files', [])\ncleaned_data = []\nfor file in files:\n    df =\
          \ pd.read_csv(file)\n    df = df.dropna()\n    df = df.drop_duplicates()\n\
          \    df['timestamp'] = pd.to_datetime(df['timestamp'], errors='coerce')\n\
          \    df = df.dropna(subset=['timestamp'])\n    cleaned_data.append(df.to_dict('records'))\n\
          return {'cleaned_records': cleaned_data, 'total_rows': sum(len(d) for d\
          \ in cleaned_data)}\n"
