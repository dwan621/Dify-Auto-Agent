    - data:
        code: "import json\nimport ftplib\nfrom io import BytesIO\nconfig = json.loads(inputs['ftp_config'])\n\
          ftp = ftplib.FTP(config['host'])\nftp.login(config['user'], config['password'])\n\
          ftp.cwd(config['directory'])\nfiles = ftp.nlst()\ncsv_files = [f for f in\
          \ files if f.endswith('.csv')]\nfile_contents = {}\nfor file in csv_files[:5]:\n\
          \    bio = BytesIO()\n    ftp.retrbinary(f'RETR {file}', bio.write)\n  \
          \  file_contents[file] = bio.getvalue().decode('utf-8')\nftp.quit()\nreturn\
          \ {'files': csv_files, 'contents': file_contents, 'count': len(csv_files)}\n"
        code_language: python
        outputs:
          result:
            type: string
            children: null
