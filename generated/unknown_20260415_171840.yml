    - data:
        code: "import json\nimport requests\ncleaned_data = json.loads(previous_output['cleaned_data'])\n\
          enhanced_data = {}\nfor filename, records in cleaned_data.items():\n   \
          \ enhanced_records = []\n    for record in records:\n        if 'ip' in\
          \ record:\n            try:\n                response = requests.get(f'http://ip-api.com/json/{record[\"\
          ip\"]}', timeout=5)\n                geo = response.json()\n           \
          \     record['country'] = geo.get('country', 'Unknown')\n              \
          \  record['city'] = geo.get('city', 'Unknown')\n            except:\n  \
          \              record['country'] = 'Unknown'\n                record['city']\
          \ = 'Unknown'\n        enhanced_records.append(record)\n    enhanced_data[filename]\
          \ = enhanced_records\nreturn {'enhanced_data': enhanced_data}\n"
