    - data:
        code: "import json\nimport sqlite3\nfrom io import StringIO\nenhanced_data\
          \ = json.loads(previous_output['enhanced_data'])\ndb_config = json.loads(inputs['db_connection'])\n\
          conn = sqlite3.connect(db_config['database'])\ncursor = conn.cursor()\n\
          inserted_rows = 0\nfor filename, records in enhanced_data.items():\n   \
          \ for record in records:\n        columns = ', '.join(record.keys())\n \
          \       placeholders = ', '.join(['?' for _ in record])\n        values\
          \ = list(record.values())\n        cursor.execute(f'INSERT OR IGNORE INTO\
          \ logs ({columns}) VALUES ({placeholders})', values)\n        inserted_rows\
          \ += cursor.rowcount\nconn.commit()\nconn.close()\nreturn {'inserted_rows':\
