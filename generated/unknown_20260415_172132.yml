    - data:
        code: "import json\nimport pandas as pd\nimport io\nimport ftplib\nimport\
          \ re\n\ninputs = json.loads(inputs)\nfiles = json.loads(files)\nftp_config\
          \ = json.loads(inputs['ftp_config'])\n\nconn = ftplib.FTP(ftp_config['host'])\n\
          conn.login(ftp_config['user'], ftplib.FTP(ftp_config['password']))\nconn.cwd(ftp_config['path'])\n\
          \ncleaned_data = []\nprocessed_files = []\n\nfor filename in files:\n  \
          \  try:\n        data = io.BytesIO()\n        conn.retrbinary(f'RETR {filename}',\
          \ data.write)\n        data.seek(0)\n        \n        df = pd.read_csv(data)\n\
          \        \n        # 数据清洗\n        df = df.dropna(subset=['timestamp', 'ip_address',\
          \ 'user_id'])\n        df['timestamp'] = pd.to_datetime(df['timestamp'],\
          \ errors='coerce')\n        df = df.dropna(subset=['timestamp'])\n     \
          \   \n        # 标准化IP格式\n        df['ip_address'] = df['ip_address'].astype(str).apply(lambda\
          \ x: re.sub(r'[^0-9.]', '', x))\n        \n        cleaned_data.append(df)\n\
          \        processed_files.append(filename)\n    except Exception as e:\n\
          \        print(f'处理文件{filename}时出错: {e}')\n\nconn.quit()\n\nif cleaned_data:\n\
          \    combined_df = pd.concat(cleaned_data, ignore_index=True)\n    return\
          \ {\n        'cleaned_data': combined_df.to_dict('records'),\n        'processed_files':\
          \ processed_files,\n        'row_count': len(combined_df)\n    }\nelse:\n\
          \    return {\n        'cleaned_data': [],\n        'processed_files': [],\n\
          \        'row_count': 0\n    }\n"
        code_language: python
        outputs:
          result:
            type: string
            children: null
