    - data:
        code: "def assess_risk(insert_result, processed_files, total_records):\n \
          \   # 基于入库结果和数据处理量评估风险\n    success_count = insert_result.get('success_count',\
          \ 0)\n    error_count = insert_result.get('error_count', 0)\n    \n    risk_level\
          \ = 'low'\n    if error_count > 10:\n        risk_level = 'high'\n    elif\
          \ error_count > 0:\n        risk_level = 'medium'\n    \n    # 处理大量数据时风险增加\n\
          \    if total_records > 10000:\n        if risk_level == 'low':\n      \
          \      risk_level = 'medium'\n        elif risk_level == 'medium':\n   \
          \         risk_level = 'high'\n    \n    return {\n        'risk_level':\
          \ risk_level,\n        'success_count': success_count,\n        'error_count':\
          \ error_count,\n        'requires_alert': risk_level in ['high', 'medium']\n\
          \    }\n"
