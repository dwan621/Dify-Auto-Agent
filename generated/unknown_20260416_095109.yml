    - data:
        code: "def validate_inputs(ftp_config, db_connection, api_key, monitoring_platform_url,\
          \ alert_recipients):\n    errors = []\n    if not ftp_config or 'host' not\
          \ in ftp_config:\n        errors.append('FTP配置无效')\n    if not db_connection\
          \ or '://' not in db_connection:\n        errors.append('数据库连接字符串无效')\n\
          \    if not api_key or len(api_key) < 10:\n        errors.append('API密钥无效')\n\
          \    if not monitoring_platform_url or not monitoring_platform_url.startswith('http'):\n\
          \        errors.append('监控平台URL无效')\n    \n    is_valid = len(errors) ==\
          \ 0\n    return {\n        'is_valid': is_valid,\n        'errors': errors,\n\
          \        'has_alert_recipients': bool(alert_recipients and alert_recipients.strip())\n\
          \    }\n"
